<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ephemeral Todo</title>
    <style>
        :root {
            --bg: #393939;
            --fg: #efeeee;
            --accent: #ffad55;
            --border: #000000;
        }
        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: monospace;
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 { font-size: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .input-group { display: flex; margin-bottom: 20px; }
        input[type="text"] {
            flex-grow: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--fg);
            padding: 8px;
            font-family: monospace;
        }
        input[type="text"]:focus { outline: 1px solid var(--accent); }
        button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--fg);
            padding: 8px 16px;
            cursor: pointer;
            font-family: monospace;
        }
        button:hover { border-color: var(--accent); }
        ul { list-style: none; padding: 0; }
        li {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border);
        }
        li.completed span { text-decoration: line-through; color: #666; }
        input[type="checkbox"] { margin-right: 15px; accent-color: var(--accent); }
        .meta { color: #666; font-size: 0.8rem; margin-top: 30px; }
        
        .actions-group {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}
.actions-group button {
    flex: 1;
    font-size: 0.8rem;
    padding: 10px;
}
.btn-danger:hover {
    border-color: #ff5555;
    background-color: rgba(255, 85, 85, 0.1);
}
.btn-warn:hover {
    border-color: #ffb86c;
    background-color: rgba(255, 184, 108, 0.1);
}
.frozen {
    color: #ffb86c !important;
}
    </style>

    <link rel="manifest" href="./manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</head>
<body>

    <h1>TO DO TODAY</h1>
    <div class="input-group">
        <input type="text" id="todo-input" placeholder="Add a task..." autocomplete="off">
        <button onclick="addItem()">Add</button>
    </div>
    <ul id="todo-list"></ul>
    <div class="meta" id="expiry-msg"></div>

    <div class="actions-group">
        <button class="btn-warn" id="freeze-btn" onclick="toggleFreeze()">Freeze Timer</button>
        <button class="btn-danger" onclick="destroyNow()">Destruct Now</button>
    </div>

    <script>
const EXPIRATION_MS = 12 * 60 * 60 * 1000; // 12 hours

function checkExpiry() {
    // If it's frozen, don't check for expiration or wipe data
    if (localStorage.getItem('todo_frozen') === 'true') return;

    const lastUpdated = localStorage.getItem('todo_timestamp');
    if (lastUpdated) {
        const now = new Date().getTime();
        if (now - parseInt(lastUpdated) > EXPIRATION_MS) {
            wipeData();
        }
    }
}

function wipeData() {
    localStorage.removeItem('todos');
    localStorage.removeItem('todo_timestamp');
    localStorage.removeItem('todo_frozen');
    localStorage.removeItem('todo_remaining');
}

function loadItems() {
    checkExpiry();
    const list = document.getElementById('todo-list');
    list.innerHTML = '';
    const todos = JSON.parse(localStorage.getItem('todos')) || [];
    
    todos.forEach((todo, index) => {
        const li = document.createElement('li');
        if (todo.completed) li.classList.add('completed');
        
        li.innerHTML = `
            <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleItem(${index})">
            <span>${todo.text}</span>
        `;
        list.appendChild(li);
    });

    updateMeta();
}

function saveItems(todos) {
    localStorage.setItem('todos', JSON.stringify(todos));
    if (todos.length > 0 && !localStorage.getItem('todo_timestamp') && localStorage.getItem('todo_frozen') !== 'true') {
        localStorage.setItem('todo_timestamp', new Date().getTime().toString());
    } else if (todos.length === 0) {
        wipeData();
    }
}

function addItem() {
    const input = document.getElementById('todo-input');
    const text = input.value.trim();
    if (!text) return;

    const todos = JSON.parse(localStorage.getItem('todos')) || [];
    todos.push({ text, completed: false });
    saveItems(todos);
    input.value = '';
    loadItems();
}

function toggleItem(index) {
    const todos = JSON.parse(localStorage.getItem('todos'));
    todos[index].completed = !todos[index].completed;
    localStorage.setItem('todos', JSON.stringify(todos));
    loadItems();
}

// --- NEW FEATURES BELOW ---

function destroyNow() {
    if (confirm("Are you sure you want to permanently shred this list?")) {
        wipeData();
        loadItems();
    }
}

function toggleFreeze() {
    const timestamp = localStorage.getItem('todo_timestamp');
    if (!timestamp) return; // Can't freeze an empty list with no timer

    const isFrozen = localStorage.getItem('todo_frozen') === 'true';
    const freezeBtn = document.getElementById('freeze-btn');
    const now = new Date().getTime();

    if (!isFrozen) {
        // FREEZING: Calculate remaining time left before expiration
        const elapsed = now - parseInt(timestamp);
        const remaining = EXPIRATION_MS - elapsed;

        localStorage.setItem('todo_frozen', 'true');
        localStorage.setItem('todo_remaining', remaining.toString());
    } else {
        // UNFREEZING: Recalculate a new start timestamp using the saved remaining duration
        const remaining = parseInt(localStorage.getItem('todo_remaining')) || EXPIRATION_MS;
        const newTimestamp = now - (EXPIRATION_MS - remaining);

        localStorage.setItem('todo_frozen', 'false');
        localStorage.setItem('todo_timestamp', newTimestamp.toString());
        localStorage.removeItem('todo_remaining');
    }
    loadItems();
}

function updateMeta() {
    const timestamp = localStorage.getItem('todo_timestamp');
    const isFrozen = localStorage.getItem('todo_frozen') === 'true';
    const msgEl = document.getElementById('expiry-msg');
    const freezeBtn = document.getElementById('freeze-btn');

    if (isFrozen) {
        const remainingMs = parseInt(localStorage.getItem('todo_remaining')) || 0;
        const mins = Math.ceil(remainingMs / (60 * 1000));
        const hours = Math.floor(mins / 60);
        const displayMins = mins % 60;

        msgEl.innerHTML = `<span class="frozen">Timer Frozen. Time remaining: ${hours}h ${displayMins}m</span>`;
        freezeBtn.innerText = "Unfreeze Timer";
        freezeBtn.style.borderColor = "#ffb86c";
    } else if (timestamp) {
        const expiryTime = new Date(parseInt(timestamp) + EXPIRATION_MS);
        msgEl.innerText = `List will self-destruct at: ${expiryTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
        freezeBtn.innerText = "Freeze Timer";
        freezeBtn.style.borderColor = "";
    } else {
        msgEl.innerText = 'No active expiration timer.';
        freezeBtn.innerText = "Freeze Timer";
        freezeBtn.style.borderColor = "";
    }
}

document.getElementById('todo-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') addItem();
});

// Initialize
loadItems();
    </script>
</body>
</html>
